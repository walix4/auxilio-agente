<svg viewBox="0 0 260 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Auxilio User App">
  <defs>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E11D2B"/>
      <stop offset="100%" stop-color="#B0121E"/>
    </linearGradient>
  </defs>
  <!-- Shield with network-node motif -->
  <g transform="translate(2,4)">
    <path d="M28 1 L52 9 V30 C52 44 41 53 28 58 C15 53 4 44 4 30 V9 Z"
          fill="url(#shieldFill)" stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- accent stripes (red/yellow/blue) referencing the family silhouettes in the brand mark -->
    <path d="M14 12 V46 Q14 50 18 51 V14 Z" fill="#ffffff" opacity="0.18"/>
    <path d="M26 11 V52 Q28 53 30 52 V11 Z" fill="#FFC72C" opacity="0.55"/>
    <path d="M38 12 V51 Q42 50 42 46 V14 Z" fill="#1E3A8A" opacity="0.35"/>
    <!-- network nodes overlay -->
    <g fill="#ffffff">
      <circle cx="11" cy="20" r="2"/>
      <circle cx="45" cy="20" r="2"/>
      <circle cx="28" cy="36" r="2.2"/>
      <circle cx="11" cy="40" r="1.5"/>
      <circle cx="45" cy="40" r="1.5"/>
    </g>
    <g stroke="#ffffff" stroke-width="0.9" opacity="0.85">
      <line x1="11" y1="20" x2="28" y2="36"/>
      <line x1="45" y1="20" x2="28" y2="36"/>
      <line x1="11" y1="40" x2="28" y2="36"/>
      <line x1="45" y1="40" x2="28" y2="36"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="68" y="34" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="#ffffff" letter-spacing="3">AUXILIO</text>
  <text x="68" y="50" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="#ffffff" opacity="0.78" letter-spacing="4">USER APP</text>
</svg>
